<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pendaftaran Mahasiswa Baru</title>
</head>
<body style="background-color: #f4f7f6; font-family: Arial, sans-serif; margin: 0; padding: 20px; color: #333;">

    <div style="max-width: 650px; margin: 0 auto; background-color: #ffffff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
        
        <div style="text-align: center; margin-bottom: 20px;">
            <img src="logostitek.png" alt="logo stitek" style="max-width: 150px; height: auto;">
        </div>

        <h1 style="text-align: center; color: #2c3e50; margin-bottom: 30px;">Formulir Pendaftaran Mahasiswa Baru</h1>

        <form action="/submit" method="post">

            <fieldset style="border: 2px solid #3498db; border-radius: 6px; padding: 20px; margin-bottom: 20px;">
                <legend style="font-weight: bold; color: #3498db; padding: 0 10px;">Data Pribadi</legend>

                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold;" for="nama">Nama Lengkap *</label>
                    <input style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;" 
                           type="text" id="nama" name="nama_lengkap" placeholder="Masukkan nama lengkap sesuai ijazah" required>
                </div>

                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold;" for="email">Email *</label>
                    <input style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;" 
                           type="email" id="email" name="email" placeholder="contoh@email.com" required>
                </div>

                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold;">Jenis Kelamin *</label>
                    <input type="radio" id="pria" name="jenis_kelamin" value="Pria" required>
                    <label for="pria" style="margin-right: 15px;">Pria</label>
                    
                    <input type="radio" id="wanita" name="jenis_kelamin" value="Wanita" required>
                    <label for="wanita">Wanita</label>
                </div>

                <div style="margin-bottom: 5px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold;" for="alamat">Alamat Lengkap</label>
                    <textarea style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; resize: vertical;" 
                              id="alamat" name="alamat" rows="4" placeholder="Tuliskan alamat domisili saat ini"></textarea>
                </div>
            </fieldset>

            <fieldset style="border: 2px solid #2ecc71; border-radius: 6px; padding: 20px; margin-bottom: 20px;">
                <legend style="font-weight: bold; color: #2ecc71; padding: 0 10px;">Peminatan & Hobi</legend>

                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold;" for="jurusan">Pilihan Jurusan *</label>
                    <select style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; background-color: #fff;" 
                            id="jurusan" name="jurusan" required>
                        <option value="">-- Pilih Jurusan --</option>
                        <option value="Teknik Informatika">Teknik Informatika</option>
                        <option value="Sistem Informasi">Sistem Informasi</option>
                        <option value="Sains Data">Sains Data</option>
                    </select>
                </div>

                <div style="margin-bottom: 5px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold;">Hobi (Pilih minimal 2)</label>
                    
                    <div style="margin-bottom: 5px;">
                        <input type="checkbox" id="hobi1" name="hobi[]" value="Membaca">
                        <label for="hobi1" style="margin-right: 15px;">Membaca</label>
                    </div>
                    
                    <div style="margin-bottom: 5px;">
                        <input type="checkbox" id="hobi2" name="hobi[]" value="Olahraga">
                        <label for="hobi2" style="margin-right: 15px;">Olahraga</label>
                    </div>

                    <div style="margin-bottom: 5px;">
                        <input type="checkbox" id="hobi3" name="hobi[]" value="Musik">
                        <label for="hobi3" style="margin-right: 15px;">Musik</label>
                    </div>

                    <div style="margin-bottom: 5px;">
                        <input type="checkbox" id="hobi4" name="hobi[]" value="Coding">
                        <label for="hobi4">Coding</label>
                    </div>
                </div>
            </fieldset>

            <div style="text-align: center;">
                <input type="submit" value="Kirim Pendaftaran" 
                       style="background-color: #34495e; color: white; padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%;">
            </div>

        </form>

        <hr style="border: 0; border-top: 1px solid #ccc; margin: 30px 0 15px 0;">

        <div style="text-align: center; font-size: 14px;">
            <p>Butuh bantuan? Kunjungi <a href="https://www.stitek.ac.id" target="_blank" style="color: #3498db; text-decoration: none; font-weight: bold;">Halaman Informasi Kampus STITEK</a></p>
        </div>

    </div>
</body>
</html>
