<!DOCTYPE html>
<html>
<head>
    <title>Form Pendaftaran</title>
</head>
<body>

<form action="#" method="post">

    <label for="nama">Nama :</label>
    <input type="text"
           id="nama"
           name="nama">

    <br><br>

    <label for="email">Email :</label>
    <input type="email"
           id="email"
           name="email">

    <br><br>

    <input type="submit"
           value="Kirim">

</form>

</body>
</html>
