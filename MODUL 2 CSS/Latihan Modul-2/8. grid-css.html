<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Praktikum 8 - CSS Grid Layout</title>
    <style>
        .grid-container {
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: auto auto; 
            gap: 15px;
            background-color: #f2f2f2;
            padding: 15px;
        }

        .grid-item {
            color: white;
            text-align: center;
            padding: 25px;
            font-size: 18px;
            font-weight: bold;
        }

       
        .warna1 { background-color: #e74c3c; grid-column: span 2; } 
        .warna2 { background-color: #2ecc71; }
        .warna3 { background-color: #3498db; }
        .warna4 { background-color: #f1c40f; }
        .warna5 { background-color: #9b59b6; }
        .warna6 { background-color: #1abc9c; }
    </style>
</head>
<body>


    <div class="grid-container">
        <div class="grid-item warna1">KOLOM 1 </div>
        <div class="grid-item warna2">KOLOM 2</div>
        <div class="grid-item warna3">KOLOM 3</div>
        <div class="grid-item warna4">KOLOM 4</div>
        <div class="grid-item warna5">KOLOM 5</div>
        <div class="grid-item warna6">KOLOM 6</div>
    </div>

</body>
</html>
