<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Praktikum 3 - Selector CSS</title>
    <style>
        /* Selector Elemen */
        p { 
            color: black; 
            padding: 8px;
        }
        
        
        .bg-hijau { 
            background-color: #99ff99; 
        }
        .bg-merah-muda { 
            background-color: #ff9999; 
        }
        
        
        #judul-kustom { 
            font-size: 32px; 
            color: rgb(191, 191, 205);
        }
    </style>
</head>
<body>

    <h1 id="judul-kustom">PROGRAM BERBASIS WEB</h1>
    
    <p class="bg-hijau">PROGRAMANBERBAIS WEB.</p>
    <p class="bg-merah-muda">PROGRAMAN BERBASIS WEB .</p>

</body>
</html>
