<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
      
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

    
        body {
            background-color: #add8e6;
            font-family: Arial, sans-serif;
            padding: 30px 20px;
            color: #333;
        }

       
        h1 {
            color: white;
            font-size: 40px;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.2);
            transition: font-size 0.3s ease;
        }

       
        .deskripsi {
            background-color: #d3d3d3;
            color: black;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto 30px auto;
            line-height: 1.6;
            border-radius: 8px; 
            text-align: justify;
        }

      
        .grid-container {
            max-width: 800px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

       
        .box {
            border: 2px solid black;
            padding: 10px;
            height: 150px;
            border-radius: 8px;
            color: #333;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        
        .box1 {
            background-color: #ff9999; 
        }

        .box2 {
            background-color: #99ff99; 
        }

        .box3 {
            background-color: #9999ff; 
        }


       

        
        @media only screen and (max-width: 768px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

       
        @media only screen and (max-width: 480px) {
           
            .grid-container {
                grid-template-columns: 1fr;
                gap: 15px;
            }

          
            h1 {
                font-size: 28px;
            }

            
            .box {
                height: 120px;
            }

            
            .deskripsi {
                padding: 12px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <h1>Praktikum modul 2</h1>

    <p class="deskripsi">Tugas Dari matakuliah pemrograman WEB </p>

    <div class="grid-container">
        <div class="box box1">
            <h3>Kotak 1</h3>
           
        </div>
        <div class="box box2">
            <h3>Kotak 2</h3>
            
        </div>
        <div class="box box3">
            <h3>Kotak 3</h3>
            
        </div>
    </div>

</body>
</html>
