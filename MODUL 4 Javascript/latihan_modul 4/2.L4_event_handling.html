<!DOCTYPE html>
<html lang="en">

<head>

    <title>Latihan Event Handling</title>

    <style>
        #inputNama {
            border: 2px solid #ccc;
            padding: 8px;
            transition: 0.3s;
        }

        #inputNama:focus {
            border-color: dodgerblue;
        }
    </style>

</head>

<body>

    <h3>gambar alam</h3>

    <img id="gambar" src="https://placehold.co/200x150/e8e8e8/000?text=Gambar+Awal" alt="gambar" onmouseover="gantiGambar()"
        onmouseout="kembalikanGambar()">

    <hr>

    <h3>gambar alam </h3>

    <label>Ketik Nama Anda :</label>

    <input type="text" id="inputNama" onchange="tampilkanOutput()">

    <p>Output :
        <span id="hasil"></span>
    </p>

    <script>

        function gantiGambar() {

            document.getElementById("gambar").src = "https://i.pinimg.com/736x/82/b8/a2/82b8a2ad2a3a229e86e7385270cacaf3.jpg";

        }

        function kembalikanGambar() {

            document.getElementById("gambar").src = "https://i.pinimg.com/736x/a9/5d/74/a95d74145e491d63bb7e785c31bd6f40.jpg";

        }

        function tampilkanOutput() {

            var nilai = document.getElementById("inputNama").value;

            document.getElementById("hasil").innerHTML = "<b>" + nilai + "</b>";

        }

    </script>

</body>

</html>
