<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Elektronik Cepat</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .product-img {
            height: 300px;
            object-fit: cover;
            border-radius: 8px;
        }
        .list-group-item {
            cursor: pointer;
            transition: all 0.2s;
        }
        .list-group-item:hover {
            background-color: #e9ecef;
        }
        .list-group-item.active-prod {
            background-color: #0d6efd;
            color: white;
        }
        .struk-box {
            border: 2px dashed #ccc;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body onload="initApp()">

    
    <nav class="navbar navbar-dark bg-dark shadow-sm mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1 fw-bold">Toko Elektronik Cepat</span>
            <span id="waktu-transaksi" class="text-white font-monospace"></span>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="row g-4">
            
            
            <div class="col-md-4">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white fw-bold">Daftar Produk</div>
                    <ul id="daftar-produk" class="list-group list-group-flush">
                        <!-- Diisi oleh JavaScript -->
                    </ul>
                </div>
            </div>

           
            <div class="col-md-4">
                <div class="card shadow-sm border-0 text-center p-3 h-100">
                    <h4 class="fw-bold mb-3">Display Produk</h4>
                    <div class="position-relative bg-light p-2 rounded mb-3">
                        <img id="slideshow-image" src="" alt="Produk" class="img-fluid product-img w-100">
                    </div>
                    <div class="d-flex justify-content-between mb-3">
                        <button class="btn btn-outline-secondary btn-sm" onclick="gantiGambar(-1)">‹ Previous</button>
                        <button class="btn btn-outline-secondary btn-sm" onclick="gantiGambar(1)">Next ›</button>
                    </div>
                    <h5 id="prod-nama" class="fw-bold text-dark mt-2"></h5>
                    <p id="prod-harga" class="text-danger fw-semibold fs-5"></p>
                </div>
            </div>

            
            <div class="col-md-4">
                <div class="card shadow-sm border-0 p-3 h-100">
                    <h4 class="fw-bold mb-3 text-center">Form Pemesanan</h4>
                    <div class="mb-3">
                        <label for="nama-pemesan" class="form-label">Nama Pemesan</label>
                        <input type="text" id="nama-pemesan" class="form-control" placeholder="Masukkan nama Anda">
                        <small id="error-nama" class="text-danger"></small>
                    </div>
                    <div class="mb-3">
                        <label for="jumlah-pesan" class="form-label">Jumlah Pesan</label>
                        <input type="number" id="jumlah-pesan" class="form-control" min="1" placeholder="Contoh: 1">
                        <small id="error-jumlah" class="text-danger"></small>
                    </div>
                    <div class="mb-3">
                        <label for="kode-promo" class="form-label">Kode Promo</label>
                        <input type="text" id="kode-promo" class="form-control" placeholder="Gunakan DISKON10">
                    </div>
                    <button class="btn btn-success w-100 fw-bold py-2 mt-2" onclick="pesanSekarang()">Pesan Sekarang</button>
                </div>
            </div>

        </div>

        
        <div class="row mt-4 d-none" id="area-struk">
            <div class="col-100">
                <div class="struk-box shadow-sm">
                    <h4 class="text-center fw-bold text-success mb-3">🧾 RINGKASAN PESANAN</h4>
                    <hr>
                    <div class="row">
                        <div class="col-sm-6">
                            <p><strong>Order ID:</strong> <span id="struk-id" class="text-primary font-monospace fw-bold"></span></p>
                            <p><strong>Nama Pemesan:</strong> <span id="struk-nama"></span></p>
                            <p><strong>Nama Produk:</strong> <span id="struk-produk"></span></p>
                        </div>
                        <div class="col-sm-6 text-sm-end">
                            <p><strong>Jumlah:</strong> <span id="struk-jumlah"></span> pcs</p>
                            <p><strong>Subtotal:</strong> <span id="struk-subtotal"></span></p>
                            <p><strong>Potongan (Diskon):</strong> <span id="struk-potongan" class="text-danger"></span></p>
                            <hr class="d-sm-none">
                            <h5 class="fw-bold mt-2">Total Akhir: <span id="struk-total" class="text-success"></span></h5>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

   
    <script>
        
        var listProduk = [
            {
                nama: "Laptop ASUS ROG Zephyrus",
                harga: 25000000,
                gambar: [
                    "https://i.pinimg.com/736x/c7/c9/22/c7c9226e606e1b63aba3325d24553d1b.jpg",
                    "https://i.pinimg.com/236x/f3/51/9f/f3519fd1f93da019018fa6de6aaeba41.jpg"
                ]
            },
            {
                nama: "Smartphone Samsung Galaxy S24",
                harga: 16000000,
                gambar: [
                    "https://i.pinimg.com/736x/ef/06/4e/ef064e7e96e82edb4e0902c46659b796.jpg",
                    "https://i.pinimg.com/webp/736x/24/22/32/24223258deb2711a6cfb6ffe2ba3b5e9.webp"
                ]
            },
            {
                nama: "Mechanical Keyboard RGB Wireless",
                harga: 12000000,
                gambar: [
                    "https://i.pinimg.com/1200x/92/1d/f7/921df71670eb6dfe5699cac37a84753e.jpg",
                    "https://i.pinimg.com/736x/3b/d2/14/3bd214f2688974a161eeb77ad0a602c1.jpg"
                ]
            }
        ];

        var produkAktifIndex = 0;
        var gambarAktifIndex = 0;

        
        function initApp() {
            jalankanJam();
            tampilkanDaftarProduk();
            pilihProduk(0);
        }

       
        function jalankanJam() {
            setInterval(function() {
                var sekarang = new Date();
                var opsi = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                var tanggalStr = sekarang.toLocaleDateString('id-ID', opsi);
                
                var jam = sekarang.getHours().toString().padStart(2, '0');
                var menit = sekarang.getMinutes().toString().padStart(2, '0');
                var detik =sekarang.getSeconds().toString().padStart(2, '0');
                
                document.getElementById("waktu-transaksi").innerText = tanggalStr + " | " + jam + ":" + menit + ":" + detik;
            }, 1000);
        }

        
        function tampilkanDaftarProduk() {
            var elDaftar = document.getElementById("daftar-produk");
            elDaftar.innerHTML = "";
            for (let i = 0; i < listProduk.length; i++) {
                elDaftar.innerHTML += `
                    <li class="list-group-item d-flex justify-content-between align-items-center" id="item-prod-${i}" onclick="pilihProduk(${i})">
                        <span>${listProduk[i].nama}</span>
                        <span class="badge bg-secondary rounded-pill">Rp ${listProduk[i].harga.toLocaleString('id-ID')}</span>
                    </li>
                `;
            }
        }

        
        function pilihProduk(index) {
            produkAktifIndex = index;
            gambarAktifIndex = 0; 

           
            for (let i = 0; i < listProduk.length; i++) {
                document.getElementById(`item-prod-${i}`).classList.remove("active-prod");
            }
            document.getElementById(`item-prod-${index}`).classList.add("active-prod");

            
            document.getElementById("prod-nama").innerText = listProduk[index].nama;
            document.getElementById("prod-harga").innerText = "Rp " + listProduk[index].harga.toLocaleString('id-ID');
            
            tampilkanGambar();
        }

        
        function tampilkanGambar() {
            var produk = listProduk[produkAktifIndex];
            document.getElementById("slideshow-image").src = produk.gambar[gambarAktifIndex];
        }

        function gantiGambar(arah) {
            var produk = listProduk[produkAktifIndex];
            gambarAktifIndex += arah;

            if (gambarAktifIndex >= produk.gambar.length) {
                gambarAktifIndex = 0;
            }
            if (gambarAktifIndex < 0) {
                gambarAktifIndex = produk.gambar.length - 1;
            }
            tampilkanGambar();
        }

        
        function pesanSekarang() {
           
            document.getElementById("error-nama").innerText = "";
            document.getElementById("error-jumlah").innerText = "";

           
            var nama = document.getElementById("nama-pemesan").value.trim();
            var jumlah = parseInt(document.getElementById("jumlah-pesan").value);
            var kodePromo = document.getElementById("kode-promo").value.trim();

           
            var isValid = true;
            if (nama === "") {
                document.getElementById("error-nama").innerText = "Nama tidak boleh kosong!";
                isValid = false;
            }
            if (isNaN(jumlah) || jumlah <= 0) {
                document.getElementById("error-jumlah").innerText = "Jumlah harus diisi dan lebih dari 0!";
                isValid = false;
            }

            if (!isValid) return;

          
            var produk = listProduk[produkAktifIndex];
            var subtotal = produk.harga * jumlah;
            var potongan = 0;

            
            if (kodePromo.toUpperCase() === "DISKON10") {
                potongan = subtotal * 0.10;
            }

            var totalAkhir = subtotal - potongan;

            
            var angkaAcak = Math.floor(Math.random() * 90000) + 10000;
            var orderId = "INV-" + angkaAcak;

            
            document.getElementById("struk-id").innerText = orderId;
            document.getElementById("struk-nama").innerText = nama;
            document.getElementById("struk-produk").innerText = produk.nama;
            document.getElementById("struk-jumlah").innerText = jumlah;
            document.getElementById("struk-subtotal").innerText = "Rp " + subtotal.toLocaleString('id-ID');
            document.getElementById("struk-potongan").innerText = "- Rp " + potongan.toLocaleString('id-ID');
            document.getElementById("struk-total").innerText = "Rp " + totalAkhir.toLocaleString('id-ID');

            
            document.getElementById("area-struk").classList.remove("d-none");
            
            alert("Pesanan Berhasil Diproses! Terima kasih.");
        }
    </script>
</body>
</html>
